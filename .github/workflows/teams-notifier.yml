name: Centralized Teams Notifier

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      component_name:
        required: true
        type: string
      status:
        required: true
        type: string
    secrets:
      WEBHOOK_URL:
        required: true

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Teams Card
        run: |
          # Ensure status comparison is case-insensitive by using uppercase
          STATUS_UPPER=$(echo "${{ inputs.status }}" | tr '[:lower:]' '[:upper:]')
          COLOR="Attention"
          ICON="❌"
          if [ "$STATUS_UPPER" == "SUCCESS" ]; then
            COLOR="Good"
            ICON="✅"
          fi

          curl -f -H 'Content-Type: application/json' -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "body": [
                  { "type": "TextBlock", "text": "'"$ICON"' ${{ inputs.project_name }} - ${{ inputs.component_name }}", "weight": "Bolder", "size": "Large", "color": "'"$COLOR"'" },
                  { "type": "TextBlock", "text": "Status: '"$STATUS_UPPER"'", "wrap": true },
                  { "type": "TextBlock", "text": "Repository: ${{ github.repository }}", "wrap": true }
                ],
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "version": "1.4"
              }
            }]
          }' "${{ secrets.WEBHOOK_URL }}"