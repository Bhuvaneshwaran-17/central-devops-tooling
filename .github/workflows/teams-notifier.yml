name: Centralized Teams Notifier

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      component_name:
        required: true
        type: string
      job_name: # NEW INPUT
        required: true
        type: string
      status:
        required: true
        type: string
    secrets:
      WEBHOOK_URL:
        required: true

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Teams Card
        run: |
          STATUS_UPPER=$(echo "${{ inputs.status }}" | tr '[:lower:]' '[:upper:]')
          COLOR=$([ "$STATUS_UPPER" == "SUCCESS" ] && echo "Good" || echo "Attention")
          ICON=$([ "$STATUS_UPPER" == "SUCCESS" ] && echo "✅" || echo "❌")

          curl -f -H 'Content-Type: application/json' -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "body": [
                  { "type": "TextBlock", "text": "'"$ICON"' ${{ inputs.project_name }}", "weight": "Bolder", "size": "Large", "color": "'"$COLOR"'" },
                  { "type": "FactSet", "facts": [
                      { "title": "Service:", "value": "${{ inputs.component_name }}" },
                      { "title": "Stage/Job:", "value": "${{ inputs.job_name }}" },
                      { "title": "Status:", "value": "'"$STATUS_UPPER"'" },
                      { "title": "Actor:", "value": "${{ github.actor }}" }
                    ]
                  },
                  { "type": "ActionSet", "actions": [
                    { "type": "Action.OpenUrl", "title": "View Logs", "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ]}
                ],
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json", "version": "1.4"
              }
            }]
          }' "${{ secrets.WEBHOOK_URL }}"